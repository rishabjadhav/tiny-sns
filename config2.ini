[Server]
PORT       = 9092
CLUSTER_ID = 2
SERVER_ID  = 1
; HOST is what clients use to reach this server (use the VM's IP or hostname).
; For single-machine development, localhost works fine.
HOST       = localhost
 
[ZooKeeper]
; Address of the running ZooKeeper instance
ADDRESS    = localhost:2181
 
[Glog]
MIN_LOG_LEVEL = 0
LOG_DIR       = ./logs
