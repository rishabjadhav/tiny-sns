syntax = "proto3";

package csce_dsc;

import "google/protobuf/timestamp.proto";

// The messenger service definition.
service SNSService {

  rpc Heartbeat(Request) returns (Reply) {} // changed Heartbeat to communicate with Connect()
  rpc Connect(Request) returns (Reply) {} // support a single connection from one user
  rpc List(Request) returns (ListReply) {}
  rpc Follow(Request) returns (Reply) {}
  rpc UnFollow(Request) returns (Reply) {}

  // Bidirectional streaming RPC
  rpc Timeline(stream Message) returns (stream Message) {}
}

message ListReply {
  repeated string all_users = 1;
  repeated string followers = 2;
}

message Request {
  string username = 1;
  repeated string arguments = 2;
}

message Reply { string msg = 1; }

message Message {
  // Username who sent the message
  string username = 1;
  // Message from the user
  string msg = 2;
  // Time the message was sent
  google.protobuf.Timestamp timestamp = 3;
}



